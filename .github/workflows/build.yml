name: Build Float30
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            .west
            modules/
            tools/
            zephyr/
            zmk/
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-
      - name: Initialize and update west modules
        run: |
          west init -l config/
          west update
          west zephyr-export
      - name: Build left half
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=float30_left -DZMK_CONFIG="${PWD}/config"
          cp build/zephyr/zmk.uf2 float30_left.uf2
      - name: Build right half
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=float30_right -DZMK_CONFIG="${PWD}/config"
          cp build/zephyr/zmk.uf2 float30_right.uf2
      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            float30_left.uf2
            float30_right.uf2
